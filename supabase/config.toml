project_id = "sillance"

[auth]
enabled = true
site_url = "https://sillance.app"
external_url = "http://127.0.0.1:54321/auth/v1"
additional_redirect_urls = ["https://sillance.app/**", "https://rowandgrv.github.io/sillance/**", "http://localhost:5500", "http://localhost:5500/**"]
jwt_expiry = 3600
jwt_issuer = "http://127.0.0.1:54321/auth/v1"
enable_refresh_token_rotation = true
enable_manual_linking = false
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8
password_requirements = ""
signing_keys_path = ""
publishable_key = ""

[auth.mfa]
max_enrolled_factors = 10
[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 900

[auth.sms]
enable_signup = false

[storage]
[storage.vector]
enabled = false

[functions.stripe-checkout]
verify_jwt = true

[functions.stripe-portal]
verify_jwt = true

# Stripe ne fournit pas de JWT Supabase : il signe avec STRIPE_WEBHOOK_SECRET.
# On désactive donc la vérif JWT pour ce endpoint (la sécurité = la signature Stripe).
[functions.stripe-webhook]
verify_jwt = false

[functions.invite-athlete]
verify_jwt = true

[functions.accept-invite]
verify_jwt = true

[functions.creneau-checkout]
verify_jwt = true

[functions.video-url]
verify_jwt = true
